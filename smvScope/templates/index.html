  <script>

var maxSampleCount = 4000; //this can be 4000 or 4800
var smvChartHeight = 320;
var currentYAxisScale = 1000;

function createChartConfig(title, yAxisLabel) {
  return {
    type: 'line',
    data: {
      datasets: [],
    },
    options: {
      animation: false,
      maintainAspectRatio: false,
      scales: {
        x: {
          title: {
            display: true,
            text: 'smpCnt',
          },
          max: maxSampleCount,
          minRotation: 0,
          maxRotation: 0,
        },
        y: {
          title: {
            display: true,
            text: yAxisLabel,
          },
          type: 'linear',
          minRotation: 0,
          maxRotation: 0,
        },
      },
      interaction: {
        intersect: false,
      },
      plugins: {
        title: {
          display: true,
          text: title,
        },
        zoom: {
          pan: {
            enabled: true,
            mode: 'x',
            overScaleMode: 'x',
          },
          zoom: {
            enabled: true,
            mode: 'xy',
            overScaleMode: 'y',
          },
        }
      }
    }
  };
}

var currentConfig = createChartConfig('Current', 'Current (A)');
var voltageConfig = createChartConfig('Voltage', 'Voltage (V)');

<script>

var chartColors = {
  red: 'rgb(255, 99, 132)',
  yellow: 'rgb(255, 205, 86)',
  green: 'rgb(75, 192, 192)',
  blue: 'rgb(0, 0, 255)',
  red2: 'rgb(255, 0, 0)',
  green2: 'rgb(0, 255, 0)',
};

var color = Chart.helpers.color;

var colorNames = Object.keys(chartColors);
var hasAppliedDefaultStreamSelection = false;
var defaultSelectedChannels = {
  '0': true,
  '1': true,
  '2': true,
  '4': true,
  '5': true,
  '6': true,
};

function getChartState(channel) {
  if (parseInt(channel, 10) < 4) {
    return {
      config: currentConfig,
      chart: window.currentChart,
      yAxisScale: currentYAxisScale,
    };
  }

  return {
    config: voltageConfig,
    chart: window.voltageChart,
    yAxisScale: voltageYAxisScale,
  };
}

function addDataset(chartState, label) {
  var colorName = colorNames[chartState.config.data.datasets.length % colorNames.length];
  var newColor = chartColors[colorName];
  var newDataset = {
    label: label,
    backgroundColor: color(newColor).alpha(0.5).rgbString(),
    borderColor: newColor,
    fill: false,
    data: [],

    pointRadius: 0,
    stepped: false,
    tension: 0,
    parsing: false,
    normalized: true,
    borderDash: [],
    //hidden: hidden,
  };

  chartState.config.data.datasets.push(newDataset);
  chartState.chart.update();
  return newDataset;
}

function applyDefaultStreamSelection() {
  if (hasAppliedDefaultStreamSelection) {
    return;
  }

  var streamSelect = document.getElementById('streamValue');
  if (!streamSelect || streamSelect.options.length === 0 || streamSelect.selectedOptions.length > 0) {
    return;
  }

  var selectedAny = false;
  for (var option of streamSelect.options) {
    var parts = option.text.split(',');
    var channel = parts.length > 1 ? parts[parts.length - 1].trim() : '';
    if (defaultSelectedChannels[channel]) {
      option.selected = true;
      $(option).attr('selected', 'true');
      selectedAny = true;
    }
  }

  if (selectedAny) {
    hasAppliedDefaultStreamSelection = true;
    sendChangeMultiple(streamSelect.options[0]);
  }
}

function sendChange(ref)
{
  var value
  if(ref.type == "checkbox") value = ref.checked;
  else value = ref.value;

  //console.log(JSON.stringify({ "id": ref.id, "value": value }));
  $.ajax({
      type: "POST",
      data: JSON.stringify({ "id": ref.id, "value": value }),
      url: 'control-setting',
      dataType: 'json',
      contentType: "application/json",
      success: function(res){
          //console.log(res);
      },
      error: function(res){
          console.log(res);
      }
  });
}

function refresh()
{
  $.ajax({
      type: "POST",
      data: JSON.stringify({ "id": "refresh", "value": 0 }),
      url: 'control-setting',
      dataType: 'json',
      contentType: "application/json",
      success: function(res){
          //console.log(res);
      },
      error: function(res){
          console.log(res);
      }
  });
}

function exportComtrade() {
  var standard = document.getElementById('comtradeStandard').value;
  var format = document.getElementById('comtradeFormat').value;

  fetch('/export-comtrade', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      standard: standard,
      format: format,
    }),
  })
    .then(async function(response) {
      if (!response.ok) {
        var errorMessage = 'COMTRADE export failed';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.error) {
            errorMessage = errorPayload.error;
          }
        }
        catch (error) {
        }
        throw new Error(errorMessage);
      }

      return response.blob();
    })
    .then(function(blob) {
      var objectUrl = window.URL.createObjectURL(blob);
      var link = document.createElement('a');
      var fallbackName = 'smvscope-comtrade.zip';
      link.href = objectUrl;
      link.download = fallbackName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.URL.revokeObjectURL(objectUrl);
    })
    .catch(function(error) {
      alert(error.message);
    });
}

function sendChangeMultiple(ref)
{
  var pref = ref.parentElement;
  var options = pref.selectedOptions;
  var values = Array.from(options).map(({ value }) => value);
  //console.log(values);
  $.ajax({
      type: "POST",
      data: JSON.stringify({ "id": pref.id, "value": values }),
      url: 'control-setting',
      dataType: 'json',
      contentType: "application/json",
      success: function(res){
          //console.log(res);
      },
      error: function(res){
          console.log(res);
      }
  });
}

function updateMaxSampleCount()
{
  currentConfig.data.labels = [];
  currentConfig.data.labels.length = 0;
  voltageConfig.data.labels = [];
  voltageConfig.data.labels.length = 0;
  for(var index =1; index < maxSampleCount; index++) {
    currentConfig.data.labels.push(index);
    voltageConfig.data.labels.push(index);
  }
  currentConfig.options.scales.x.max = maxSampleCount;
  voltageConfig.options.scales.x.max = maxSampleCount;

  if (window.currentChart) {
    window.currentChart.update();
  }
  if (window.voltageChart) {
    window.voltageChart.update();
  }
}

function getPhasorLabel(channel, type) {
  var phaseLabels = ['L1', 'L2', 'L3', 'N'];
  var phaseLabel = phaseLabels[parseInt(channel, 10) % phaseLabels.length];
  if (type === 'voltage') {
    return 'V ' + phaseLabel + '-E';
  }
  return 'I ' + phaseLabel;
}

function getPhaseColor(channel, type) {
  var phaseColors = [
    'rgb(255, 0, 0)',
    'rgb(0, 180, 0)',
    'rgb(0, 70, 255)',
    type === 'voltage' ? 'rgb(0, 70, 255)' : 'rgb(255, 0, 0)'
  ];
  return phaseColors[parseInt(channel, 10) % phaseColors.length];
}

function getChannelRmsMagnitude(samples, channel, yAxisScale) {
  var sumSquares = 0;
  var sampleCount = 0;

  samples.forEach(function(sample) {
    if (sample['channels'] && sample['channels'][channel]) {
      var scaledValue = sample['channels'][channel]['y'] / yAxisScale;
      sumSquares += scaledValue * scaledValue;
      sampleCount++;
    }
  });

  if (sampleCount === 0) {
    return 0;
  }

  return Math.sqrt(sumSquares / sampleCount);
}

function getChannelPhasor(samples, channel, yAxisScale) {
  var real = 0;
  var imag = 0;
  var sampleRate = parseInt(maxSampleCount, 10);
  var samplesPerCycle = 80;
  var fundamentalCycles = sampleRate / samplesPerCycle;

  samples.forEach(function(sample) {
    if (sample['channels'] && sample['channels'][channel]) {
      var sampleIndex = sample['x'] - 1;
      var scaledValue = sample['channels'][channel]['y'] / yAxisScale;
      var theta = 2 * Math.PI * fundamentalCycles * sampleIndex / sampleRate;
      real += scaledValue * Math.cos(theta);
      imag -= scaledValue * Math.sin(theta);
    }
  });

  var magnitude = getChannelRmsMagnitude(samples, channel, yAxisScale);
  if (magnitude === 0 || (real === 0 && imag === 0)) {
    return {
      magnitude: magnitude,
      angle: 0,
      real: 0,
      imag: 0,
    };
  }

  var angle = Math.atan2(imag, real) * 180 / Math.PI;
  var angleRad = angle * Math.PI / 180;

  return {
    magnitude: magnitude,
    angle: angle,
    real: magnitude * Math.cos(angleRad),
    imag: magnitude * Math.sin(angleRad),
  };
}

function createPhasorEntry(label, channel, phasor, colorOverride) {
  return {
    label: label,
    channel: channel,
    magnitude: phasor.magnitude,
    angle: phasor.angle,
    color: colorOverride,
  };
}

function complexAdd(a, b) {
  return {
    real: a.real + b.real,
    imag: a.imag + b.imag,
  };
}

function complexMultiply(a, b) {
  return {
    real: a.real * b.real - a.imag * b.imag,
    imag: a.real * b.imag + a.imag * b.real,
  };
}

function complexDivide(value, divisor) {
  return {
    real: value.real / divisor,
    imag: value.imag / divisor,
  };
}

function complexFromPolar(magnitude, angleDeg) {
  var angleRad = angleDeg * Math.PI / 180;
  return {
    real: magnitude * Math.cos(angleRad),
    imag: magnitude * Math.sin(angleRad),
  };
}

function complexToPhasor(value) {
  return {
    magnitude: Math.sqrt(value.real * value.real + value.imag * value.imag),
    angle: Math.atan2(value.imag, value.real) * 180 / Math.PI,
    real: value.real,
    imag: value.imag,
  };
}

function getSequenceColor(sequenceType, type) {
  if (sequenceType === 'positive') {
    return type === 'voltage' ? 'rgb(0, 70, 255)' : 'rgb(255, 0, 0)';
  }
  if (sequenceType === 'negative') {
    return 'rgb(255, 140, 0)';
  }
  return 'rgb(120, 120, 120)';
}

function getPhasorColor(phasor, type) {
  if (phasor.color) {
    return phasor.color;
  }

  return getPhaseColor(phasor.channel, type);
}

function normalizeAngle(angle) {
  var normalized = angle % 360;
  if (normalized > 180) {
    normalized -= 360;
  }
  if (normalized <= -180) {
    normalized += 360;
  }
  return normalized;
}

function getVoltageReferenceAngle() {
  for (var index = 0; index < latestVoltagePhasors.length; index++) {
    if (latestVoltagePhasors[index].label === 'V L1-E') {
      return latestVoltagePhasors[index].angle;
    }
  }

  return 0;
}

function rotatePhasorForReference(phasor, referenceAngle) {
  return Object.assign({}, phasor, {
    angle: normalizeAngle(phasor.angle - referenceAngle),
  });
}

function rotatePhasorListForReference(phasors, referenceAngle) {
  return phasors.map(function(phasor) {
    return rotatePhasorForReference(phasor, referenceAngle);
  });
}

function buildSequenceComponents(phasePhasors, type, streamId, streamCount) {
  if (phasePhasors.length < 3) {
    return [];
  }

  var operatorA = complexFromPolar(1, 120);
  var operatorA2 = complexFromPolar(1, 240);
  var va = { real: phasePhasors[0].real, imag: phasePhasors[0].imag };
  var vb = { real: phasePhasors[1].real, imag: phasePhasors[1].imag };
  var vc = { real: phasePhasors[2].real, imag: phasePhasors[2].imag };
  var zero = complexDivide(complexAdd(complexAdd(va, vb), vc), 3);
  var positive = complexDivide(complexAdd(complexAdd(va, complexMultiply(operatorA, vb)), complexMultiply(operatorA2, vc)), 3);
  var negative = complexDivide(complexAdd(complexAdd(va, complexMultiply(operatorA2, vb)), complexMultiply(operatorA, vc)), 3);
  var labelPrefix = streamCount > 1 ? ('S' + streamId + ' ') : '';
  var quantityLabel = type === 'voltage' ? 'V' : 'I';

  return [
    createPhasorEntry(labelPrefix + quantityLabel + '+', phasePhasors[0].channel, complexToPhasor(positive), getSequenceColor('positive', type)),
    createPhasorEntry(labelPrefix + quantityLabel + '-', phasePhasors[1].channel, complexToPhasor(negative), getSequenceColor('negative', type)),
    createPhasorEntry(labelPrefix + quantityLabel + '0', phasePhasors[2].channel, complexToPhasor(zero), getSequenceColor('zero', type)),
  ];
}

function drawArrow(ctx, startX, startY, endX, endY, strokeStyle) {
  var headLength = 10;
  var angle = Math.atan2(endY - startY, endX - startX);

  ctx.strokeStyle = strokeStyle;
  ctx.fillStyle = strokeStyle;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(endX, endY);
  ctx.lineTo(
    endX - headLength * Math.cos(angle - Math.PI / 6),
    endY - headLength * Math.sin(angle - Math.PI / 6)
  );
  ctx.lineTo(
    endX - headLength * Math.cos(angle + Math.PI / 6),
    endY - headLength * Math.sin(angle + Math.PI / 6)
  );
  ctx.closePath();
  ctx.fill();
}

function drawPhasorGrid(ctx, width, height, title, unit, maxMagnitude) {
  var centerX = width / 2;
  var centerY = height / 2;
  var radius = Math.min(width, height) * 0.42;

  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);

  ctx.strokeStyle = '#222222';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
  ctx.stroke();

  ctx.strokeStyle = '#b6b6b6';
  ctx.setLineDash([3, 4]);
  for (var ring = 1; ring < 4; ring++) {
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius * ring / 4, 0, 2 * Math.PI);
    ctx.stroke();
  }

  for (var deg = 0; deg < 360; deg += 30) {
    var angle = deg * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(centerX + radius * Math.cos(angle), centerY - radius * Math.sin(angle));
    ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = '#111111';
  ctx.font = '16px sans-serif';
  ctx.fillText(title, 12, 24);
  ctx.fillText('+' + 90 + '°', centerX - 18, 20);
  ctx.fillText('-90°', centerX - 18, height - 12);
  ctx.fillText('180°', 12, centerY + 20);
  ctx.fillText('0°', width - 40, centerY + 20);
  ctx.fillText(maxMagnitude.toFixed(1) + ' ' + unit, 12, height - 12);

  return {
    centerX: centerX,
    centerY: centerY,
    radius: radius,
  };
}

function renderPhasorView(canvas, title, phasors, unit, type) {
  if (!canvas) {
    return;
  }

  var ctx = canvas.getContext('2d');
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var maxMagnitude = 1;
  phasors.forEach(function(phasor) {
    maxMagnitude = Math.max(maxMagnitude, phasor.magnitude);
  });

  var grid = drawPhasorGrid(ctx, rect.width, rect.height, title, unit, maxMagnitude);

  ctx.font = '14px sans-serif';
  phasors.forEach(function(phasor) {
    var angleRad = phasor.angle * Math.PI / 180;
    var normalizedMagnitude = phasor.magnitude / maxMagnitude;
    var endX = grid.centerX + grid.radius * normalizedMagnitude * Math.cos(angleRad);
    var endY = grid.centerY - grid.radius * normalizedMagnitude * Math.sin(angleRad);
    var phaseColor = getPhasorColor(phasor, type);

    ctx.fillStyle = phaseColor;
    drawArrow(ctx, grid.centerX, grid.centerY, endX, endY, phaseColor);
    ctx.fillText(phasor.label, endX + 8, endY - 8);
  });
}

function renderRmsMeter(elementId, phasors, unit) {
  var meter = document.getElementById(elementId);
  if (!meter) {
    return;
  }

  if (phasors.length === 0) {
    meter.innerHTML = '<div class="meter-label">No data</div>';
    return;
  }

  var html = '';
  phasors.forEach(function(phasor) {
    var phaseColor = getPhasorColor(phasor, unit === 'V' ? 'voltage' : 'current');
    html += '<div class="meter-value">';
    html += '<div class="meter-label" style="color:' + phaseColor + ';">' + phasor.label + '</div>';
    html += '<div class="meter-reading">' + phasor.magnitude.toFixed(2) + ' ' + unit + '</div>';
    html += '</div>';
  });
  meter.innerHTML = html;
}

function updatePowerSelectionOptions(selectId, phasors, preferredLabel) {
  var select = document.getElementById(selectId);
  if (!select) {
    return;
  }

  var previousValue = select.value;
  select.innerHTML = '';

  phasors.forEach(function(phasor) {
    var option = document.createElement('option');
    option.value = phasor.label;
    option.textContent = phasor.label;
    select.appendChild(option);
  });

  if (phasors.length === 0) {
    return;
  }

  var nextValue = previousValue;
  if (!nextValue || !phasors.some(function(phasor) { return phasor.label === nextValue; })) {
    nextValue = preferredLabel;
  }
  if (!phasors.some(function(phasor) { return phasor.label === nextValue; })) {
    nextValue = phasors[0].label;
  }
  select.value = nextValue;
}

function findSelectedPhasor(phasors, selectId) {
  var select = document.getElementById(selectId);
  if (!select) {
    return null;
  }

  for (var index = 0; index < phasors.length; index++) {
    if (phasors[index].label === select.value) {
      return phasors[index];
    }
  }

  return null;
}

function getPowerComponents(voltagePhasor, currentPhasor) {
  var powerAngle = normalizeAngle(voltagePhasor.angle - currentPhasor.angle);
  var apparentPower = voltagePhasor.magnitude * currentPhasor.magnitude;
  var activePower = apparentPower * Math.cos(powerAngle * Math.PI / 180);
  var reactivePower = apparentPower * Math.sin(powerAngle * Math.PI / 180);

  return {
    powerAngle: powerAngle,
    apparentPower: apparentPower,
    activePower: activePower,
    reactivePower: reactivePower,
  };
}

function formatMegaPower(value, unit) {
  return (value / 1000000).toFixed(4) + ' M' + unit;
}

function getPhaseKey(label) {
  if (label.indexOf('L1') !== -1) {
    return 'L1';
  }
  if (label.indexOf('L2') !== -1) {
    return 'L2';
  }
  if (label.indexOf('L3') !== -1) {
    return 'L3';
  }
  return '';
}

function buildThreePhasePower(currentPhasors, voltagePhasors) {
  var currentByPhase = {};
  var voltageByPhase = {};

  currentPhasors.forEach(function(phasor) {
    var phaseKey = getPhaseKey(phasor.label);
    if (phaseKey && !currentByPhase[phaseKey]) {
      currentByPhase[phaseKey] = phasor;
    }
  });

  voltagePhasors.forEach(function(phasor) {
    var phaseKey = getPhaseKey(phasor.label);
    if (phaseKey && !voltageByPhase[phaseKey]) {
      voltageByPhase[phaseKey] = phasor;
    }
  });

  var phases = ['L1', 'L2', 'L3'];
  var pairCount = 0;
  var totalActivePower = 0;
  var totalReactivePower = 0;
  var totalApparentMagnitude = 0;

  phases.forEach(function(phaseKey) {
    if (!currentByPhase[phaseKey] || !voltageByPhase[phaseKey]) {
      return;
    }

    var phasePower = getPowerComponents(voltageByPhase[phaseKey], currentByPhase[phaseKey]);
    pairCount++;
    totalActivePower += phasePower.activePower;
    totalReactivePower += phasePower.reactivePower;
    totalApparentMagnitude += phasePower.apparentPower;
  });

  if (pairCount === 0) {
    return null;
  }

  var totalApparentPower = Math.sqrt(totalActivePower * totalActivePower + totalReactivePower * totalReactivePower);

  return {
    pairCount: pairCount,
    apparentPower: totalApparentPower,
    activePower: totalActivePower,
    reactivePower: totalReactivePower,
    powerFactor: totalApparentPower === 0 ? 0 : totalActivePower / totalApparentPower,
  };
}

function renderPowerMeter(currentPhasors, voltagePhasors) {
  var powerMetrics = document.getElementById('powerMetrics');
  if (!powerMetrics) {
    return;
  }

  updatePowerSelectionOptions('powerVoltageSelection', voltagePhasors, 'V L1-E');
  updatePowerSelectionOptions('powerCurrentSelection', currentPhasors, 'I L1');

  var selectedVoltage = findSelectedPhasor(voltagePhasors, 'powerVoltageSelection');
  var selectedCurrent = findSelectedPhasor(currentPhasors, 'powerCurrentSelection');
  var threePhasePower = buildThreePhasePower(currentPhasors, voltagePhasors);

  if (!selectedVoltage || !selectedCurrent) {
    powerMetrics.innerHTML = '<div class="meter-label">Select a voltage and current phasor to calculate power.</div>';
    return;
  }

  var selectedPower = getPowerComponents(selectedVoltage, selectedCurrent);
  var html =
    '<div class="meter-label mb-2">Using ' + selectedVoltage.label + ' and ' + selectedCurrent.label + '</div>' +
    '<div class="power-metrics-grid">' +
      '<div class="power-metric"><div class="power-metric-label">Selected Apparent Power</div><div class="power-metric-value">' + formatMegaPower(selectedPower.apparentPower, 'VA') + '</div></div>' +
      '<div class="power-metric"><div class="power-metric-label">Selected Active Power</div><div class="power-metric-value">' + formatMegaPower(selectedPower.activePower, 'W') + '</div></div>' +
      '<div class="power-metric"><div class="power-metric-label">Selected Reactive Power</div><div class="power-metric-value">' + formatMegaPower(selectedPower.reactivePower, 'var') + '</div></div>' +
      '<div class="power-metric"><div class="power-metric-label">Power Angle</div><div class="power-metric-value">' + selectedPower.powerAngle.toFixed(2) + '°</div></div>' +
    '</div>';

  if (threePhasePower) {
    html +=
      '<div class="meter-label mt-3 mb-2">3-Phase totals from matched L1/L2/L3 pairs</div>' +
      '<div class="power-metrics-grid">' +
        '<div class="power-metric"><div class="power-metric-label">3-Phase Apparent Power</div><div class="power-metric-value">' + formatMegaPower(threePhasePower.apparentPower, 'VA') + '</div></div>' +
        '<div class="power-metric"><div class="power-metric-label">3-Phase Active Power</div><div class="power-metric-value">' + formatMegaPower(threePhasePower.activePower, 'W') + '</div></div>' +
        '<div class="power-metric"><div class="power-metric-label">3-Phase Reactive Power</div><div class="power-metric-value">' + formatMegaPower(threePhasePower.reactivePower, 'var') + '</div></div>' +
        '<div class="power-metric"><div class="power-metric-label">3-Phase Power Factor</div><div class="power-metric-value">' + threePhasePower.powerFactor.toFixed(4) + '</div></div>' +
      '</div>';
  }

  powerMetrics.innerHTML = html;
}

function updatePhasorTitles(showCurrentSequenceComponents, showVoltageSequenceComponents) {
  document.getElementById('currentMeterTitle').textContent = showCurrentSequenceComponents ? 'Current Sequence Components' : 'Current RMS';
  document.getElementById('voltageMeterTitle').textContent = showVoltageSequenceComponents ? 'Voltage Sequence Components' : 'Voltage RMS';
}

var latestCurrentPhasors = [];
var latestVoltagePhasors = [];
var latestCurrentSequencePhasors = [];
var latestVoltageSequencePhasors = [];
var activeView = 'waveformView';
var activeTopLevelTab = 'measurementAnalysisTab';

function setActiveTopLevelTab(tabId) {
  activeTopLevelTab = tabId;

  document.querySelectorAll('.top-level-tab-button').forEach(function(button) {
    var isActive = button.getAttribute('data-top-level-target') === tabId;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });

  document.querySelectorAll('.top-level-tab-panel').forEach(function(panel) {
    panel.classList.toggle('active', panel.id === tabId);
  });

  if (tabId === 'measurementAnalysisTab') {
    window.requestAnimationFrame(function() {
      setActiveView(activeView);
    });
  }
}

function setActiveView(viewId) {
  activeView = viewId;

  document.querySelectorAll('.view-nav-button').forEach(function(button) {
    var isActive = button.getAttribute('data-view-target') === viewId;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });

  document.querySelectorAll('.view-panel').forEach(function(panel) {
    panel.classList.toggle('active', panel.id === viewId);
  });

  window.requestAnimationFrame(function() {
    if (viewId === 'phasorView') {
      renderPhasorPanels();
      return;
    }

    if (window.currentChart) {
      window.currentChart.resize();
      window.currentChart.update('none');
    }
    if (window.voltageChart) {
      window.voltageChart.resize();
      window.voltageChart.update('none');
    }
  });
}

function renderPhasorPanels() {
  if (activeView !== 'phasorView') {
    return;
  }

  var showCurrentSequenceComponents = document.getElementById('showCurrentSequenceComponents').checked;
  var showVoltageSequenceComponents = document.getElementById('showVoltageSequenceComponents').checked;
  var referenceAngle = getVoltageReferenceAngle();
  var currentDisplayPhasors = rotatePhasorListForReference(
    showCurrentSequenceComponents ? latestCurrentSequencePhasors : latestCurrentPhasors,
    referenceAngle
  );
  var voltageDisplayPhasors = rotatePhasorListForReference(
    showVoltageSequenceComponents ? latestVoltageSequencePhasors : latestVoltagePhasors,
    referenceAngle
  );

  updatePhasorTitles(showCurrentSequenceComponents, showVoltageSequenceComponents);
  renderPhasorView(
    document.getElementById('currentPhasorChart'),
    showCurrentSequenceComponents ? 'Current Sequence Components' : 'Current Phasor View',
    currentDisplayPhasors,
    'A',
    'current'
  );
  renderPhasorView(
    document.getElementById('voltagePhasorChart'),
    showVoltageSequenceComponents ? 'Voltage Sequence Components' : 'Voltage Phasor View',
    voltageDisplayPhasors,
    'V',
    'voltage'
  );
  renderRmsMeter('currentRmsMeter', currentDisplayPhasors, 'A');
  renderRmsMeter('voltageRmsMeter', voltageDisplayPhasors, 'V');
  renderPowerMeter(currentDisplayPhasors, voltageDisplayPhasors);
}

window.onload = function() {
  document.getElementById('currentChart').style.height = smvChartHeight + 'px';
  document.getElementById('voltageChart').style.height = smvChartHeight + 'px';
  document.getElementById('currentPhasorChart').style.height = smvChartHeight + 'px';
  document.getElementById('voltagePhasorChart').style.height = smvChartHeight + 'px';
  const currentCtx = document.getElementById('currentChart').getContext('2d');
  const voltageCtx = document.getElementById('voltageChart').getContext('2d');
  window.currentChart = new Chart(currentCtx, currentConfig);
  window.voltageChart = new Chart(voltageCtx, voltageConfig);
  document.getElementById('showCurrentSequenceComponents').addEventListener('change', renderPhasorPanels);
  document.getElementById('showVoltageSequenceComponents').addEventListener('change', renderPhasorPanels);
  document.getElementById('powerVoltageSelection').addEventListener('change', renderPhasorPanels);
  document.getElementById('powerCurrentSelection').addEventListener('change', renderPhasorPanels);
  document.getElementById('exportComtradeButton').addEventListener('click', exportComtrade);
  document.querySelectorAll('.top-level-tab-button').forEach(function(button) {
    button.addEventListener('click', function() {
      setActiveTopLevelTab(button.getAttribute('data-top-level-target'));
    });
  });
  document.querySelectorAll('.view-nav-button').forEach(function(button) {
    button.addEventListener('click', function() {
      setActiveView(button.getAttribute('data-view-target'));
    });
  });

  updateMaxSampleCount();
  setActiveTopLevelTab(activeTopLevelTab);

  const stream_source = new EventSource("/stream-data");
  stream_source.onmessage = function (event) {
    const cdata = JSON.parse(event.data);

    var infos = ""
    for(var svID in cdata['stream_info']) {
      infos += "svID: " + svID;
      infos += ", channels: " + cdata['stream_info'][svID]['size']/8;
      infos += ", confRev: " + cdata['stream_info'][svID]['confRev'];
      infos += ", smpSync: " + cdata['stream_info'][svID]['smpSync'];
      infos += ", seconds running: " + cdata['stream_info'][svID]['seconds'];
      infos += "<BR>";
    }
    const info = document.getElementById('info');
    info.innerHTML = infos;

    var usedCurrent = [];
    var usedVoltage = [];
    var currentPhasors = [];
    var voltagePhasors = [];
    var currentSequencePhasors = [];
    var voltageSequencePhasors = [];
    var streamCount = Object.keys(cdata['dataSets']).length;
    for(var svID in cdata['dataSets']) { //streams
      var streamSamples = cdata['dataSets'][svID];
      var currentPhasePhasors = [];
      var voltagePhasePhasors = [];
      for(var channel in cdata['dataSets'][svID][0]['channels']) {
        var chartState = getChartState(channel);
        var dset = 'Dataset ' + svID + ',' + channel; //derive label from key stream/channel values
        var curDataSet = null;
        chartState.config.data.datasets.forEach(function(dataset) { //search for this dataset
          if( dataset.label === dset){ // if found, add data to it
            curDataSet = dataset;
          }
        });
        if(curDataSet == null){
          // no dataset found, so add it
          curDataSet = addDataset(chartState, dset);
        }
        if (parseInt(channel, 10) < 4) {
          usedCurrent.push(curDataSet);
        }
        else {
          usedVoltage.push(curDataSet);
        }

        curDataSet.length = 0;
        curDataSet.data = []; //clear the data

        var index = 0;
        for(var idx = 1; idx < maxSampleCount; idx++) {
          if(typeof cdata['dataSets'][svID][index] !== 'undefined'){
            var smpCnt = cdata['dataSets'][svID][index]['x'];
            if(idx == smpCnt ) {
              var yval = cdata['dataSets'][svID][index]['channels'][channel]['y'] / chartState.yAxisScale;
              curDataSet.data.push({
                x: smpCnt,
                y: yval,
              });
              index++;
              continue;
            }
          }
          //add a null sample
          curDataSet.data.push({
            x: idx,
            y: 0,
          });
        }

        var phasor = getChannelPhasor(streamSamples, channel, chartState.yAxisScale);
        if (phasor.magnitude > 0) {
          if (parseInt(channel, 10) < 4) {
            currentPhasors.push(createPhasorEntry(getPhasorLabel(channel, 'current'), channel, phasor));
            if (parseInt(channel, 10) < 3) {
              currentPhasePhasors.push({
                channel: channel,
                real: phasor.real,
                imag: phasor.imag,
              });
            }
          }
          else {
            voltagePhasors.push(createPhasorEntry(getPhasorLabel(channel, 'voltage'), channel, phasor));
            if (parseInt(channel, 10) < 7) {
              voltagePhasePhasors.push({
                channel: channel,
                real: phasor.real,
                imag: phasor.imag,
              });
            }
          }
        }
      }

      currentPhasePhasors.sort(function(a, b) {
        return parseInt(a.channel, 10) - parseInt(b.channel, 10);
      });
      voltagePhasePhasors.sort(function(a, b) {
        return parseInt(a.channel, 10) - parseInt(b.channel, 10);
      });
      currentSequencePhasors = currentSequencePhasors.concat(buildSequenceComponents(currentPhasePhasors, 'current', svID, streamCount));
      voltageSequencePhasors = voltageSequencePhasors.concat(buildSequenceComponents(voltagePhasePhasors, 'voltage', svID, streamCount));
    }
    currentConfig.data.datasets = usedCurrent;
    voltageConfig.data.datasets = usedVoltage;
    window.currentChart.update();
    window.voltageChart.update();
    latestCurrentPhasors = currentPhasors;
    latestVoltagePhasors = voltagePhasors;
    latestCurrentSequencePhasors = currentSequencePhasors;
    latestVoltageSequencePhasors = voltageSequencePhasors;
    renderPhasorPanels();
  }
  
  const log_source = new EventSource("/log-data");
  log_source.onmessage = function (event) {
    const data = JSON.parse(event.data);
    var log_item = document.getElementById('log');
    for(const item of data){
      log_item.value += item + "\n";
    }
    log_item.scrollTop = log_item.scrollHeight;
  }

  const control_source = new EventSource("/control-data");
  control_source.onmessage = function (event) {
    const data = JSON.parse(event.data);
    for(const dataItem in data) {
      if(dataItem == "streamSelect_items") { // populate stream list with items (means a new stream was discovered)
        const streamSelect = document.getElementById('streamValue');
        streamSelect.options.length = 0;
        var i = 1;
        for (var item of data[dataItem]) {
          var opt = new Option(item,i);
          
          opt.onmousedown = function() {
              if ($(this).is(':selected')) {
                  $(this).removeAttr('selected');
                  this.selected = false;
              } else {
                  $(this).attr('selected','true');
                  this.selected = true;
              }
              sendChangeMultiple(this);
              return false;
            };
          streamSelect.add(opt);
          i++;
        }
      }
      else { // just update a regular control
        for (const prop in data[dataItem] ) {
          var obj = document.getElementById( prop );
          if (typeof data[dataItem][prop] === "boolean") {
            obj.checked = data[dataItem][prop];
          }
          if(prop === "streamValue"){//handling for a multiselect list control
            for(var option of obj.options){
              if(data[dataItem][prop].includes(option.value) ){
                option.selected = true;
                $(option).attr('selected','true');
              }
              else{
                option.selected = false;
                $(option).removeAttr('selected');
              }
            }
          }
          else {//any generic control; just update item.value
            obj.value = data[dataItem][prop];
          }
        }
      } 
    }
    applyDefaultStreamSelection();
  }

  refresh();
};
</script>
